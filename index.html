<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Netto Forfettario</title>
<meta name="description" content="Calcola in automatico tasse e contributi INPS del regime forfettario e tieni traccia della soglia di 85.000€." />
<meta name="theme-color" content="#1F2D3D" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { margin: 0; }
.app-root { min-height: 100vh; background: #E9E4D8; font-family: 'Inter', sans-serif; color: #1F2D3D; padding-bottom: 100px; }
.header { display: flex; justify-content: space-between; align-items: flex-start; padding: 24px 20px 8px; }
.wordmark { font-family: 'Fraunces', serif; font-style: italic; font-weight: 600; font-size: 24px; }
.subtitle { font-size: 12px; color: #4A5A6A; margin-top: 2px; }
.icon-btn { background: #FDFBF6; border: 1px solid #DDD6C4; border-radius: 10px; padding: 8px; color: #1F2D3D; cursor: pointer; }
.main { padding: 12px 20px 0; display: flex; flex-direction: column; gap: 16px; max-width: 480px; margin: 0 auto; }
.hero-card { background: #FDFBF6; border: 1px solid #DDD6C4; border-radius: 18px; padding: 20px; display: flex; align-items: center; gap: 16px; }
.ring-value { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; fill: #1F2D3D; }
.ring-label { font-family: 'Inter', sans-serif; font-size: 10px; fill: #4A5A6A; }
.hero-numbers { flex: 1; min-width: 0; }
.hero-figure { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; }
.hero-caption { font-size: 12px; color: #4A5A6A; margin-top: 2px; }
.alert-pill { margin-top: 10px; background: #F6E9E7; color: #B23A2E; font-size: 11px; padding: 6px 10px; border-radius: 999px; display: flex; align-items: center; gap: 6px; line-height: 1.3; }
.grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mini-card { background: #FDFBF6; border: 1px solid #DDD6C4; border-radius: 14px; padding: 14px; }
.mini-card.highlight { background: #EAF1EC; border-color: #C7DBCD; }
.mini-label { font-size: 11px; color: #4A5A6A; margin-bottom: 4px; }
.mini-value { font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 500; }
.chart-card { background: #FDFBF6; border: 1px solid #DDD6C4; border-radius: 18px; padding: 16px 12px; }
.section-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; padding: 0 6px; }
.bars-wrap { display: flex; align-items: flex-end; gap: 4px; height: 160px; padding: 0 4px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
.bar-pair { display: flex; align-items: flex-end; gap: 2px; height: 130px; width: 100%; justify-content: center; }
.bar { width: 6px; border-radius: 2px 2px 0 0; min-height: 2px; }
.bar-a { background: #2F6E4F; }
.bar-b { background: #A9782E; }
.bar-label { font-size: 9px; color: #4A5A6A; margin-top: 4px; }
.sim-banner { background: #1F2D3D; color: #FDFBF6; border: none; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; }
.sim-banner span { flex: 1; text-align: left; }
.ledger { background: #FDFBF6; border: 1px solid #DDD6C4; border-radius: 18px; padding: 16px 8px; }
.ledger-row { display: flex; align-items: center; gap: 8px; padding: 10px 8px; border-bottom: 1px solid #EFEAE0; }
.ledger-row:last-child { border-bottom: none; }
.ledger-main { flex: 1; min-width: 0; }
.ledger-causale { font-size: 13px; font-weight: 500; }
.ledger-date { font-size: 11px; color: #4A5A6A; font-family: 'IBM Plex Mono', monospace; }
.ledger-amounts { text-align: right; }
.ledger-importo { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; }
.ledger-accantona { font-size: 10px; color: #A9782E; font-family: 'IBM Plex Mono', monospace; }
.ledger-del { background: none; border: none; color: #B23A2E; opacity: 0.5; cursor: pointer; padding: 4px; }
.empty { font-size: 12px; color: #4A5A6A; padding: 8px; }
.disclaimer { font-size: 10.5px; color: #7A8797; line-height: 1.5; padding: 0 6px 20px; }
.fab { position: fixed; bottom: 28px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: #2F6E4F; color: white; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(31,45,61,0.25); cursor: pointer; }
.modal-overlay { position: fixed; inset: 0; background: rgba(31,45,61,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 40; }
.modal { background: #FDFBF6; width: 100%; max-width: 480px; border-radius: 20px 20px 0 0; padding: 22px 20px 28px; max-height: 85vh; overflow-y: auto; }
.setup-modal { border-radius: 20px; margin: auto 16px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.modal-title { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; }
.modal-sub { font-size: 12px; color: #4A5A6A; margin-bottom: 14px; }
.field { display: block; margin-bottom: 14px; }
.field-label { display: block; font-size: 12px; color: #4A5A6A; margin-bottom: 4px; }
.field-input { width: 100%; box-sizing: border-box; border: 1px solid #DDD6C4; border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: 'Inter', sans-serif; background: white; color: #1F2D3D; }
.field-input.mono { font-family: 'IBM Plex Mono', monospace; }
.checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 14px; }
.ateco-hint { font-size: 11.5px; margin-top: 6px; padding: 6px 10px; border-radius: 8px; line-height: 1.4; }
.ateco-hint-ok { background: #EAF1EC; color: #2F6E4F; }
.ateco-hint-ko { background: #F6E9E7; color: #B23A2E; }
.link-btn { background: none; border: none; color: #4A5A6A; font-size: 11.5px; text-decoration: underline; padding: 6px 2px 0; cursor: pointer; font-family: 'Inter', sans-serif; }
.field-input:disabled { background: #F0EEE6; color: #7A8797; }
.primary-btn { width: 100%; background: #1F2D3D; color: #FDFBF6; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; margin-top: 4px; }
.primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.preview-box { background: #F3EFE4; border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; }
.preview-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
.preview-row.muted { color: #4A5A6A; font-size: 12px; }
.preview-row.warn { color: #B23A2E; font-weight: 600; }
.range { width: 100%; margin: 12px 0 6px; }
.range-value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; text-align: center; margin-bottom: 14px; }
.stamp-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 60; pointer-events: none; }
.stamp-mark { background: rgba(178,58,46,0.94); color: white; border: 3px solid rgba(255,255,255,0.85); border-radius: 14px; padding: 18px 26px; display: flex; flex-direction: column; align-items: center; gap: 4px; transform: scale(2.2) rotate(-12deg); opacity: 0; animation: stampIn 1.4s ease forwards; }
.stamp-title { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 2px; margin-top: 2px; }
.stamp-amount { font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; }
@keyframes stampIn {
  0% { transform: scale(2.4) rotate(-16deg); opacity: 0; }
  15% { transform: scale(0.94) rotate(-8deg); opacity: 1; }
  25% { transform: scale(1.04) rotate(-9deg); opacity: 1; }
  35% { transform: scale(1) rotate(-8deg); opacity: 1; }
  80% { transform: scale(1) rotate(-8deg); opacity: 1; }
  100% { transform: scale(1) rotate(-8deg); opacity: 0; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
